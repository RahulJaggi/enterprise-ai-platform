name: enterprise-ai-platform

services:
  # ============================================================================
  # PostgreSQL 16 - Relational Database (Users, Auth, Metadata, Audit Logs)
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: enterprise_ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_ai_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secure_password}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-enterprise_ai_db}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - enterprise_ai_network

  # ============================================================================
  # Redis 7 - Cache, Session Store & Queue Manager
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: enterprise_ai_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_password} --appendonly yes
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a ${REDIS_PASSWORD:-redis_secure_password} ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - enterprise_ai_network

  # ============================================================================
  # Qdrant Vector Store - Dense Embeddings & Vector Search Engine
  # ============================================================================
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: enterprise_ai_qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    ports:
      - '${QDRANT_HTTP_PORT:-6333}:6333'
      - '${QDRANT_GRPC_PORT:-6334}:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:6333/readyz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - enterprise_ai_network

  # ============================================================================
  # pgAdmin 4 - PostgreSQL Database Management Interface
  # ============================================================================
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: enterprise_ai_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@enterprise-ai.internal}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin_secure_password}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://localhost:80/misc/ping || exit 1',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - enterprise_ai_network

# ==============================================================================
# Persistent Named Volumes
# ==============================================================================
volumes:
  postgres_data:
    name: enterprise_ai_postgres_data
  redis_data:
    name: enterprise_ai_redis_data
  qdrant_data:
    name: enterprise_ai_qdrant_data
  pgadmin_data:
    name: enterprise_ai_pgadmin_data

# ==============================================================================
# Named Network Isolation
# ==============================================================================
networks:
  enterprise_ai_network:
    name: enterprise_ai_network
    driver: bridge
